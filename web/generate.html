<body style="background-color:white" onload=onpageload()><table style="background-color:red">
<td><h2> UPI Merchant QR Code Generator</h2></td>
</table>

<div>
<form action="javascript:;" onsubmit="myFunction()">
  <input type="radio" id="bill" name="choice" value="bill" checked onclick="hider()"> Make Bill  
  <input type="radio" id="poster" name="choice" value="poster" onclick="hider()"> Create Poster<br><p>
  Name : <br><input type="text" id="name"  required/> <br>
  Virtual Address : <br><input type="email" id="vpa" required oninvalid="this.setCustomValidity('Please enter proper Virtual Address')" oninput="setCustomValidity('')"/><br>
  <div id="selector"> Amount Payable :  <br><input type="text" id="amount" pattern="\d+(\.\d{2})?" oninvalid="this.setCustomValidity('Please enter proper amount')" oninput="setCustomValidity('')"/><br> 
  Particulars (optional) : <br><input type="text" id="notes" /><br> </div>
  <input type="submit" value="Generate Code"  />
</form>
</div>
<table style="background-color:blue"><td style="font-family:Trebuchet MS; color:white">Jyothis Thaliath<td></table>
</body>


<script type="text/javascript">

function onpageload()
{
	document.getElementById("bill").checked="true";
	hider();
}

function hider()
{
	if(document.getElementById("bill").checked)
	{
		document.getElementById("selector").style.display="block";
	}
	else
	{
		document.getElementById("selector").style.display="none";
	}
}

function myFunction()
{
	var cht="qr";
	var chs="300x300";

	var name = document.getElementById("name").value;
	var vpa = document.getElementById("vpa").value;
	var amount = document.getElementById("amount").value;
	var notes = document.getElementById("notes").value;
	var chl = "upi://pay?pn="+name+"&pa="+vpa+"&am="+amount+"&tn="+notes;
	
	// NOTE: The original code used the Google Chart Infographics API:
	//   https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl={data}
	// Google officially deprecated and shut down this API.
	// Replaced with QR Server API (drop-in alternative, same result):
	//   https://api.qrserver.com/v1/create-qr-code/?size=300x300&data={data}
	// encodeURIComponent() added to safely encode the UPI deeplink string.
	var apiURL="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(chl);
    
    {
		myWindow=window.open('','','width=350,height=450');
		myWindow.document.write("<div style='text-align:center;font-size:30px'>QR Code for UPI<br><img src="+apiURL+"/></div>");
		myWindow.document.write("<div style='text-align:center;font-size:20px'>Scan this code using UPI application <br>to pay <b>" + name + "</b></a>")
		myWindow.document.write("<br><br><a class='noprint' href='javascript:window.print()'>Click to Print</a></div>");
		myWindow.focus();
	}
	//form.submit();
	
}

</script>
