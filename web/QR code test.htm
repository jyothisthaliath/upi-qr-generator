<body style="background-color:white"><p><table style="background-color:red">
<td><h2> UPI Merchant QR Code Generator</h2></td>
</table>

<div>
<form action="javascript:;" onsubmit="myFunction()">
  Name : <br><input type="text" id="name"  /> <br>
  Virtual Address : <br><input type="text" id="vpa"  /><br>
  Amount Payable : <br><input type="text" id="amount" /><br>
  Particulars : <br><input type="text" id="notes" /><br>
  <input type="submit" value="Generate Code"  />
</form>
</div>
<table style="background-color:blue"><td style="font-family:Trebuchet MS; color:white">By Jyothis Thaliath<td></table>
</body> 


<script type="text/javascript">
 
function myFunction() 
{ 
	var cht="qr";
	var chs="300x300";
	
	var name = document.getElementById("name").value;
	var vpa = document.getElementById("vpa").value;
	var amount = document.getElementById("amount").value;
	var notes = document.getElementById("notes").value;
	var chl = "upi://pay?pn="+name+"&pa="+vpa+"&am="+amount+"&tn="+notes; 
	
	
	var form = document.createElement("form");
    var element1 = document.createElement("input"); 
    var element2 = document.createElement("input");  
	var element3 = document.createElement("input");  

    form.method = "GET";
	form.acceptCharset = "UTF-8";
	// NOTE: The original code submitted a form GET to the Google Chart Infographics API:
	//   action: https://chart.googleapis.com/chart
	//   params: cht=qr, chs=300x300, chl={data}
	// Google officially deprecated and shut down this API.
	// Replaced with QR Server API:
	//   action: https://api.qrserver.com/v1/create-qr-code/
	//   params: size=300x300, data={data}  (cht param not required)
    form.action = "https://api.qrserver.com/v1/create-qr-code/";
	form.setAttribute("target", "_blank");
	form.setAttribute("id","newform");
	
	element1.value="300x300";
    element1.name="size";
    form.appendChild(element1);  

    element2.value=chl;
    element2.name="data";
    form.appendChild(element2);  
	
    document.body.appendChild(form);
    form.submit();	
	var d = document.getElementById("newform").parentElement
	d.removeChild(form)
}
 
</script>
